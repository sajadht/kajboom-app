function gregorianToJalali(gy, gm, gd) {
  const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let jy = (gy <= 1600) ? 0 : 979;
  gy -= (gy <= 1600) ? 621 : 1600;
  const gy2 = (gm > 2) ? (gy + 1) : gy;
  let days = (365*gy) + (Math.floor((gy2+3)/4)) - (Math.floor((gy2+99)/100)) + (Math.floor((gy2+399)/400)) - 80 + gd + g_d_m[gm-1];
  jy += 33*Math.floor(days/12053);
  days %= 12053;
  jy += 4*Math.floor(days/1461);
  days %= 1461;
  if (days > 365) { jy += Math.floor((days-1)/365); days = (days-1)%365; }
  let jm, jd;
  if (days < 186) { jm = 1 + Math.floor(days/31); jd = 1 + (days%31); }
  else { jm = 7 + Math.floor((days-186)/30); jd = 1 + ((days-186)%30); }
  return [jy, jm, jd];
}
function isoLocal(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function getSaturday(d) {
  const day = d.getDay(); // 0=Sun..6=Sat
  const diff = (day + 1) % 7; // days since Saturday
  const r = new Date(d);
  r.setDate(d.getDate() - diff);
  r.setHours(0,0,0,0);
  return r;
}
function jalaliLabel(d) {
  const j = gregorianToJalali(d.getFullYear(), d.getMonth()+1, d.getDate());
  return j[2] + " " + MONTHS[j[1]-1];
}
function jalaliMonthKey(dateISO) {
  const d = new Date(dateISO + "T00:00:00");
  const j = gregorianToJalali(d.getFullYear(), d.getMonth()+1, d.getDate());
  return { key: j[0] + "-" + j[1], label: MONTHS[j[1]-1] + " " + j[0] };
}
function todayISO() { return isoLocal(new Date()); }

function useDoc(docId, initial) {
  const [value, setValue] = useState(initial);
  const [loaded, setLoaded] = useState(false);
  const [err, setErr] = useState(null);
  useEffect(() => {
    const ref = db.collection("kajboom").doc(docId);
    const unsub = ref.onSnapshot(
      (snap) => {
        if (snap.exists) setValue(snap.data().value);
        else ref.set({ value: initial }).catch(() => {});
        setLoaded(true);
      },
      (e) => { setErr(String(e)); setLoaded(true); }
    );
    return unsub;
  }, [docId]);
  const update = (next) => {
    const resolved = typeof next === "function" ? next(value) : next;
    setValue(resolved);
    db.collection("kajboom").doc(docId).set({ value: resolved }).catch((e) => setErr(String(e)));
  };
  return [value, update, loaded, err];
}

function Niche(props) {
  const style = Object.assign({ background: C.card, borderRadius: "22px 22px 10px 10px", border: "1px solid " + C.sandDark, padding: "18px 18px 16px" }, props.style || {});
  return h("div", { style: style }, props.children);
}
function DuneDivider() {

  );
}
function SectionTitle(props) {

}
function KPICard(props) {

  );
}
function Pill(props) {
  const map = {
    ok: ["#E4EBDD", C.sage], due: ["#F5E7CE", C.gold], overdue: ["#F2DEDD", C.pomegranate],
    income: ["#E4EBDD", C.sage], expense: ["#F2DEDD", C.pomegranate],
    done: ["#E4EBDD", C.sage], planned: ["#E4E7EF", C.night],
  };
  const pair = map[props.tone] || map.ok;
  return h("span", { style: { background: pair[0], color: pair[1], fontSize: 11, padding: "3px 9px", borderRadius: 999, fontWeight: 600 } }, props.text);
}
const inputStyle = { fontSize: 12.5, padding: "7px 9px", borderRadius: 8, border: "1px solid " + C.sandDark, background: "#fff", color: C.ink };
const btnStyle = { fontSize: 12.5, fontWeight: 600, padding: "7px 14px", borderRadius: 8, border: "none", background: C.clay, color: "#fff", cursor: "pointer" };
const btnCircle = { width: 24, height: 24, borderRadius: "50%", border: "none", background: C.clay, color: "#fff", cursor: "pointer" };

function MiniChart(props) {
  const data = props.data, keys = props.keys, colors = props.colors, type = props.type || "bar", height = props.height || 200;
  if (!data.length) return null;
  const max = Math.max(1, ...data.flatMap((d) => keys.map((k) => Number(d[k]) || 0)));
  const w = 100 / data.length;
  const shapes = [];
  if (type === "bar") {
    data.forEach((d, i) => {
      keys.forEach((k, ki) => {
        const val = Number(d[k]) || 0;
        const bw = (w / keys.length) * 0.7;
        const x = i * w + ki * (w / keys.length) + (w / keys.length - bw) / 2;
        const hgt = (val / max) * 100;
        shapes.push(h("rect", { key: k + i, x: x * 3, y: 110 - hgt, width: bw * 3, height: hgt, fill: colors[ki], rx: "2" }));
      });
    });
  } else if (type === "line") {
    keys.forEach((k, ki) => {
      const pts = data.map((d, i) => (i * w * 3 + w * 1.5) + "," + (110 - (Number(d[k]) || 0) / max * 100)).join(" ");
      shapes.push(h("polyline", { key: k, points: pts, fill: "none", stroke: colors[ki], strokeWidth: "2" }));
    });
  }
  return h("div", null,
    h("svg", { viewBox: "0 0 300 120", style: { width: "100%", height: height }, preserveAspectRatio: "none" }, shapes),
    h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 9, color: C.inkSoft, marginTop: 2 } },
      data.map((d) => h("span", { key: d.month }, d.month))
    ),
    h("div", { style: { display: "flex", gap: 10, marginTop: 4, fontSize: 11 } },
      keys.map((k, i) => h("span", { key: k, style: { color: colors[i] } }, "■ " + k))
    )
  );
}

const DEFAULT_ROOMS = [

  { id: "bukhara", name: "اتاق بخارا", type: "master", capacity: 2, pricePerPerson: 1900 },
  { id: "samarkand", name: "اتاق سمرقند", type: "nonmaster", capacity: 2, pricePerPerson: 1700 },
  { id: "bushehr", name: "اتاق بوشهر", type: "nonmaster", capacity: 5, pricePerPerson: 1700 },
];
const DAYS = ["شنبه", "یک‌شنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنج‌شنبه", "جمعه"];
const DEFAULT_EQUIPMENT = [

  { id: uid(), name: "پکیج حرارتی مرکزی", intervalDays: 180, lastChecked: todayISO(), repairs: [] },

];

const DEFAULT_CARBON = [];
const CO2_BENCHMARK_LOW = 8, CO2_BENCHMARK_HIGH = 18;
const DEFAULT_EVENTS = [
  { id: uid(), title: "جشن نوروز و هفت‌سین", season: "فروردین", budget: 15, status: "planned" },
  { id: uid(), title: "شب رصد ستاره در کویر", season: "فروردین", budget: 12, status: "planned" },
  { id: uid(), title: "کارگاه بافت شال و عبا", season: "اردیبهشت", budget: 8, status: "planned" },
  { id: uid(), title: "فستیوال غذای محلی", season: "خرداد", budget: 10, status: "planned" },
  { id: uid(), title: "تور عکاسی کویر", season: "تیر", budget: 7, status: "planned" },
  { id: uid(), title: "شب موسیقی سنتی", season: "مرداد", budget: 18, status: "planned" },
  { id: uid(), title: "شب شعر و ادب پارسی", season: "شهریور", budget: 6, status: "planned" },
  { id: uid(), title: "جشن برداشت انار", season: "مهر", budget: 9, status: "planned" },
  { id: uid(), title: "پیاده‌روی شبانه با ماه کامل", season: "آبان", budget: 5, status: "planned" },
  { id: uid(), title: "شب یلدا", season: "آذر", budget: 14, status: "planned" },
];

const TABS = [
  { key: "overview", label: "نمای کلی", emoji: "🏠" },
  { key: "reservations", label: "رزرواسیون", emoji: "📅" },
  { key: "maintenance", label: "تعمیرات", emoji: "🔧" },
  { key: "accounting", label: "حسابداری", emoji: "🧮" },
  { key: "inventory", label: "انبار", emoji: "📦" },
  { key: "carbon", label: "ردپای کربن", emoji: "🌿" },
  { key: "events", label: "رویدادها", emoji: "🎉" },
  { key: "growth", label: "توسعه فردی", emoji: "📚" },
];

function App() {
  const [tab, setTab] = useState("overview");
  const rr = useDoc("rooms", DEFAULT_ROOMS); const rooms = rr[0], setRooms = rr[1], roomsL = rr[2];
  const rm = useDoc("reservations", {}); const resMap = rm[0], setResMap = rm[1], resL = rm[2];
  const eq = useDoc("equipment", DEFAULT_EQUIPMENT); const equipment = eq[0], setEquipment = eq[1], eqL = eq[2];
  const iv = useDoc("inventory", DEFAULT_INVENTORY); const inventory = iv[0], setInventory = iv[1], invL = iv[2];
  const fn = useDoc("finance", DEFAULT_FINANCE); const finance = fn[0], setFinance = fn[1], finL = fn[2], finErr = fn[3];
  const cb = useDoc("carbon", DEFAULT_CARBON); const carbon = cb[0], setCarbon = cb[1], carbonL = cb[2];
  const ev = useDoc("events", DEFAULT_EVENTS); const events = ev[0], setEvents = ev[1], evL = ev[2];
  const ac = useDoc("accounts", DEFAULT_ACCOUNTS); const accounts = ac[0], setAccounts = ac[1], accL = ac[2];

  const addFinanceEntry = (e) => setFinance((f) => f.concat([Object.assign({}, e, { id: uid() })]));
  const allLoaded = roomsL && resL && eqL && invL && finL && carbonL && evL && accL;

  const financeByMonth = useMemo(() => {
    const map = {};
    finance.forEach((e) => {
      const mk = jalaliMonthKey(e.date || todayISO());
      if (!map[mk.key]) map[mk.key] = { key: mk.key, month: mk.label, "درآمد": 0, "هزینه": 0 };
      if (e.flow === "income") map[mk.key]["درآمد"] += Number(e.amount) || 0;
      else map[mk.key]["هزینه"] += Number(e.amount) || 0;
    });
    return Object.values(map).sort((a, b) => a.key < b.key ? -1 : 1);
  }, [finance]);

  const incomeByCategory = useMemo(() => {
    const m = {};
    finance.filter((e) => e.flow === "income").forEach((e) => { m[e.category] = (m[e.category] || 0) + Number(e.amount || 0); });
    return m;
  }, [finance]);
  const expenseByCategory = useMemo(() => {
    const m = {};
    finance.filter((e) => e.flow === "expense").forEach((e) => { m[e.category] = (m[e.category] || 0) + Number(e.amount || 0); });
    return m;
  }, [finance]);
  const balanceByAccount = useMemo(() => {
    const m = {};
    accounts.forEach((a) => { m[a] = 0; });
    finance.forEach((e) => {
      if (!e.account) return;
      m[e.account] = (m[e.account] || 0) + (e.flow === "income" ? Number(e.amount || 0) : -Number(e.amount || 0));
    });
    return m;
  }, [finance, accounts]);
  const guestNightsForMonthKey = (monthKey) => {
    let total = 0;
    Object.keys(resMap).forEach((k) => {
      const parts = k.split(":");
      const dateISO = parts[1];
      if (dateISO && dateISO.slice(0, 7) === monthKey) {
        const raw = resMap[k];
        const g = typeof raw === "number" ? raw : (raw ? raw.guests : 0);
        total += Number(g) || 0;
      }
    });
    return total;
  };
  const CO2_BENCHMARK_PER_GUEST_NIGHT = 15; // kg CO2e, mid-point of the 8-18 kg/guest-night range typical for boutique/limited-service guesthouses (industry benchmarks: Cornell/Greenview HCMI, DEFRA)
  const carbonSeries = useMemo(() => carbon.slice().sort((a, b) => a.monthKey < b.monthKey ? -1 : 1).map((r) => {
    const totalCO2 = Number(r.electricity) * 0.5 + Number(r.gas) * 1.95 + Number(r.water) * 0.45;
    const guestNights = guestNightsForMonthKey(r.monthKey);
    const perGuest = guestNights > 0 ? totalCO2 / guestNights : null;
    return Object.assign({}, r, { month: r.monthKey, "کربن": +totalCO2.toFixed(0), guestNights: guestNights, perGuest: perGuest });
  }), [carbon, resMap]);

  const equipStatus = (e) => {
    if (!e.intervalDays || !e.lastChecked) return "due";
    const next = new Date(e.lastChecked + "T00:00:00");
    next.setDate(next.getDate() + Number(e.intervalDays));
    const today = new Date(); today.setHours(0,0,0,0);
    const diffDays = Math.floor((next - today) / 86400000);
    if (diffDays < 0) return "overdue";
    if (diffDays <= 3) return "due";
    return "ok";
  };
  const lowStock = inventory.filter((i) => Number(i.qty) < Number(i.min));
  const dueEquipment = equipment.filter((e) => equipStatus(e) !== "ok");
  const overdueEquip = equipment.filter((e) => equipStatus(e) === "overdue").length;
  const lastFin = financeByMonth[financeByMonth.length - 1] || { "درآمد": 0, "هزینه": 0 };
  const lastCarbon = carbonSeries[carbonSeries.length - 1] || { "کربن": 0 };

  if (!allLoaded) return h("div", { dir: "rtl", style: { padding: 30, color: C.inkSoft } }, "در حال بارگذاری…");
  if (finErr) return h("div", { dir: "rtl", style: { padding: 30, color: C.pomegranate } }, "خطای اتصال به پایگاه‌داده: " + finErr);

  return h("div", { dir: "rtl", style: { background: C.sand, minHeight: "100vh", display: "flex" } },
    h("div", { style: { width: 170, flexShrink: 0, background: C.night, padding: "18px 10px", display: "flex", flexDirection: "column", gap: 3 } },
      h("div", { style: { color: C.gold, fontWeight: 700, fontSize: 15 } }, "کاج‌بوم"),
      h("div", { style: { color: "#A9B0C9", fontSize: 10, marginBottom: 14 } }, "اقامتگاه سنتی نایین"),
      TABS.map((t) => h("button", {
        key: t.key, onClick: () => setTab(t.key),
        style: { display: "flex", alignItems: "center", gap: 8, background: tab === t.key ? C.nightSoft : "transparent",
          color: tab === t.key ? C.gold : "#C7CCDF", border: "none", borderRadius: 9, padding: "8px 9px", fontSize: 12, cursor: "pointer", textAlign: "right" }
      }, h("span", null, t.emoji), t.label))
    ),
    h("div", { style: { flex: 1, padding: "20px 22px", maxWidth: 1000 } },
      h("div", { style: { fontSize: 19, fontWeight: 700, marginBottom: 4 } }, (TABS.find((t) => t.key === tab) || {}).label),
      h("div", { style: { fontSize: 11.5, color: C.inkSoft, marginBottom: 16 } }, "داده‌ها بین همهٔ دستگاه‌ها به‌صورت زنده هماهنگ می‌شوند"),

      tab === "overview" ? h(React.Fragment, null,
        dueEquipment.length ? h(Niche, { style: { marginBottom: 14, border: "1px solid " + C.pomegranate } },
          h("div", { style: { fontWeight: 700, color: C.pomegranate, fontSize: 13 } }, "⏰ امروز این تجهیزات را بررسی کنید:"),
          h("div", { style: { fontSize: 12, marginTop: 6, color: C.ink } }, dueEquipment.map((e) => e.name).join("، "))
        ) : null,
        h("div", { style: { display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 } },
          h(KPICard, { emoji: "🧮", label: "درآمد ماه اخیر", value: lastFin["درآمد"], sub: "هزینه: " + lastFin["هزینه"], tone: C.sage }),
          h(KPICard, { emoji: "💰", label: "سود خالص", value: lastFin["درآمد"] - lastFin["هزینه"], tone: C.clay }),
          h(KPICard, { emoji: "🔧", label: "تعمیرات عقب‌افتاده", value: overdueEquip, tone: C.pomegranate }),
          h(KPICard, { emoji: "📦", label: "کالای رو به اتمام", value: lowStock.length, sub: lowStock.map((i) => i.name).join("، ") || "کافی است", tone: C.gold }),
          h(KPICard, { emoji: "🌿", label: "ردپای کربن اخیر", value: lastCarbon["کربن"] + " kg", tone: C.sage })
        ),
        h(Niche, null,
          h(SectionTitle, { eyebrow: "روند مالی", title: "درآمد و هزینه ماهانه" }),
          financeByMonth.length ? h(MiniChart, { data: financeByMonth, keys: ["درآمد", "هزینه"], colors: [C.clay, C.sageSoft], type: "bar" }) : h("div", { style: { fontSize: 12, color: C.inkSoft } }, "هنوز تراکنشی ثبت نشده.")
        )
      ) : null,

      tab === "reservations" ? h(ReservationsTab, { rooms: rooms, setRooms: setRooms, resMap: resMap, setResMap: setResMap, addFinanceEntry: addFinanceEntry, accounts: accounts }) : null,
      tab === "maintenance" ? h(MaintenanceTab, { equipment: equipment, setEquipment: setEquipment, addFinanceEntry: addFinanceEntry, accounts: accounts, equipStatus: equipStatus }) : null,
      tab === "accounting" ? h(AccountingTab, { finance: finance, setFinance: setFinance, financeByMonth: financeByMonth, incomeByCategory: incomeByCategory, expenseByCategory: expenseByCategory, accounts: accounts, setAccounts: setAccounts, balanceByAccount: balanceByAccount }) : null,
      tab === "inventory" ? h(InventoryTab, { inventory: inventory, setInventory: setInventory, addFinanceEntry: addFinanceEntry, accounts: accounts }) : null,
      tab === "carbon" ? h(CarbonTab, { carbon: carbon, setCarbon: setCarbon, carbonSeries: carbonSeries }) : null,
      tab === "events" ? h(EventsTab, { events: events, setEvents: setEvents }) : null,
      tab === "growth" ? h(Niche, null,
        h(SectionTitle, { eyebrow: "آینه علاقه‌مندی‌ها", title: "پیشنهاد توسعه فردی" }),

function ReservationsTab(props) {
  const rooms = props.rooms, setRooms = props.setRooms, resMap = props.resMap, setResMap = props.setResMap, addFinanceEntry = props.addFinanceEntry, accounts = props.accounts;
  const [editRoom, setEditRoom] = useState(null);
  const [priceDraft, setPriceDraft] = useState("");
  const [logAccount, setLogAccount] = useState(accounts[0] || "");
  const [weekStart, setWeekStart] = useState(() => getSaturday(new Date()));
  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState({ guests: "1", name: "", phone: "" });

  const weekDates = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 7; i++) { const d = new Date(weekStart); d.setDate(weekStart.getDate() + i); arr.push(d); }
    return arr;
  }, [weekStart]);

  const key = (rid, dateISO) => rid + ":" + dateISO;
  const getEntry = (rid, dateISO) => {
    const raw = resMap[key(rid, dateISO)];
    if (!raw) return { guests: 0, name: "", phone: "" };
    if (typeof raw === "number") return { guests: raw, name: "", phone: "" };
    return raw;
  };

  const weeklyTotal = useMemo(() => {
    let s = 0;
    rooms.forEach((r) => weekDates.forEach((d) => { s += getEntry(r.id, isoLocal(d)).guests * r.pricePerPerson; }));
    return s;
    // eslint-disable-next-line
  }, [rooms, resMap, weekDates]);

  const savePrice = (id) => { setRooms((rs) => rs.map((r) => r.id === id ? Object.assign({}, r, { pricePerPerson: Number(priceDraft) || r.pricePerPerson }) : r)); setEditRoom(null); };
  const logToAccounting = () => { if (weeklyTotal > 0) addFinanceEntry({ date: todayISO(), flow: "income", category: "اقامت", account: logAccount, amount: weeklyTotal, note: "درآمد رزرو هفتگی" }); };

  const openCell = (r, d) => {
    const dateISO = isoLocal(d);
    const entry = getEntry(r.id, dateISO);
    setSelected({ roomId: r.id, dateISO: dateISO, roomName: r.name, dateLabel: jalaliLabel(d) });
    setForm({ guests: String(entry.guests || 0), name: entry.name || "", phone: entry.phone || "" });
  };
  const saveCell = () => {
    if (!selected) return;
    setResMap((m) => { const n = Object.assign({}, m); n[key(selected.roomId, selected.dateISO)] = { guests: Number(form.guests) || 0, name: form.name, phone: form.phone }; return n; });
    setSelected(null);
  };
  const clearCell = () => {
    if (!selected) return;
    setResMap((m) => { const n = Object.assign({}, m); n[key(selected.roomId, selected.dateISO)] = { guests: 0, name: "", phone: "" }; return n; });
    setSelected(null);
  };

  const weekLabel = jalaliLabel(weekDates[0]) + " تا " + jalaliLabel(weekDates[6]);

  return h(React.Fragment, null,
    h(Niche, { style: { marginBottom: 14 } },
      h(SectionTitle, { eyebrow: "قیمت‌گذاری", title: "اتاق‌ها (قیمت هر نفر)" }),
      rooms.map((r) => h("div", { key: r.id, style: { display: "flex", justifyContent: "space-between", alignItems: "center", background: C.sand, borderRadius: 10, padding: "8px 12px", marginBottom: 6 } },
        h("div", null,
          h("div", { style: { fontWeight: 600, fontSize: 13 } }, r.name),
          h("div", { style: { fontSize: 11, color: C.inkSoft } }, (r.type === "master" ? "مستر" : "غیرمستر") + " — ظرفیت " + r.capacity + " نفر")
        ),
        editRoom === r.id
          ? h("div", { style: { display: "flex", gap: 6 } },
              h("input", { style: Object.assign({}, inputStyle, { width: 80 }), value: priceDraft, onChange: (e) => setPriceDraft(e.target.value) }),
              h("button", { style: btnStyle, onClick: () => savePrice(r.id) }, "ذخیره")
            )
          : h("button", { onClick: () => { setEditRoom(r.id); setPriceDraft(String(r.pricePerPerson)); }, style: { border: "none", background: "none", cursor: "pointer", fontWeight: 700, color: C.clay } }, r.pricePerPerson + " ✎")
      ))
    ),
    h(Niche, null,
      h(SectionTitle, { eyebrow: "تقویم اشغال", title: "اتاق × روز" }),
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 } },
        h("button", { style: Object.assign({}, btnStyle, { padding: "5px 10px", fontSize: 11 }), onClick: () => setWeekStart((w) => { const n = new Date(w); n.setDate(w.getDate() - 7); return n; }) }, "◀ هفتهٔ قبل"),
        h("div", { style: { fontSize: 12.5, fontWeight: 700, color: C.ink } }, weekLabel),
        h("button", { style: Object.assign({}, btnStyle, { padding: "5px 10px", fontSize: 11 }), onClick: () => setWeekStart((w) => { const n = new Date(w); n.setDate(w.getDate() + 7); return n; }) }, "هفتهٔ بعد ▶")
      ),
      h("div", { style: { overflowX: "auto" } },
        h("table", { style: { borderCollapse: "collapse", width: "100%", fontSize: 12 } },
          h("thead", null, h("tr", null, h("th", { style: { padding: 6 } }, "اتاق"), weekDates.map((d, i) => h("th", { key: i, style: { padding: 6, color: C.inkSoft, fontWeight: 500 } }, DAYS[i] + " – " + jalaliLabel(d))))),
          h("tbody", null, rooms.map((r) => h("tr", { key: r.id },
            h("td", { style: { padding: 6, fontWeight: 600 } }, r.name),
            weekDates.map((d, di) => {
              const entry = getEntry(r.id, isoLocal(d));
              const g = entry.guests;
              return h("td", { key: di, style: { padding: 4, textAlign: "center" } },
                h("button", { onClick: () => openCell(r, d), style: { border: "none", cursor: "pointer", borderRadius: 8, padding: "6px 4px", width: 66, background: g > 0 ? C.claySoft : C.sandDark, color: g > 0 ? "#fff" : C.inkSoft, fontSize: 10.5 } }, g > 0 ? (g + " نفر" + (entry.name ? " - " + entry.name.split(" ")[0] : "")) : "خالی")
              );
            })
          )))
        )
      ),
      h("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 12, flexWrap: "wrap", gap: 8 } },
        h("div", { style: { fontWeight: 700, color: C.clay, fontSize: 12.5 } }, "درآمد تخمینی این هفته: " + weeklyTotal),
        h("div", { style: { display: "flex", gap: 6 } },
          h("select", { style: inputStyle, value: logAccount, onChange: (e) => setLogAccount(e.target.value) }, accounts.map((a) => h("option", { key: a }, a))),
          h("button", { style: btnStyle, onClick: logToAccounting }, "ثبت در حسابداری")
        )
      )
    ),
    selected ? h(Niche, { style: { marginTop: 14 } },
      h(SectionTitle, { eyebrow: selected.roomName + " — " + selected.dateLabel, title: "جزئیات رزرو" }),
      h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
        h("input", { style: Object.assign({}, inputStyle, { width: 70 }), placeholder: "تعداد نفر", value: form.guests, onChange: (e) => setForm(Object.assign({}, form, { guests: e.target.value })) }),
        h("input", { style: inputStyle, placeholder: "نام مهمان", value: form.name, onChange: (e) => setForm(Object.assign({}, form, { name: e.target.value })) }),
        h("input", { style: inputStyle, placeholder: "شماره تماس", value: form.phone, onChange: (e) => setForm(Object.assign({}, form, { phone: e.target.value })) })
      ),
      h("div", { style: { display: "flex", gap: 6, marginTop: 10 } },
        h("button", { style: btnStyle, onClick: saveCell }, "ذخیره"),
        h("button", { style: Object.assign({}, btnStyle, { background: C.pomegranate }), onClick: clearCell }, "خالی‌کردن"),
        h("button", { style: Object.assign({}, btnStyle, { background: C.inkSoft }), onClick: () => setSelected(null) }, "بستن")
      )
    ) : null
  );
}

function MaintenanceTab(props) {
  const equipment = props.equipment, setEquipment = props.setEquipment, addFinanceEntry = props.addFinanceEntry, accounts = props.accounts, equipStatus = props.equipStatus;
  const [openId, setOpenId] = useState(null);
  const [form, setForm] = useState({ desc: "", cost: "", date: todayISO(), account: accounts[0] || "" });
  const [newEq, setNewEq] = useState({ name: "", intervalDays: "90" });

  const nextDateOf = (e) => {
    if (!e.lastChecked || !e.intervalDays) return "-";
    const d = new Date(e.lastChecked + "T00:00:00");
    d.setDate(d.getDate() + Number(e.intervalDays));
    return jalaliLabel(d);
  };

  const submitRepair = (id) => {
    if (!form.desc) return;
    setEquipment((eqs) => eqs.map((e) => e.id === id ? Object.assign({}, e, { lastChecked: form.date, repairs: (e.repairs || []).concat([{ id: uid(), desc: form.desc, cost: form.cost, date: form.date }]) }) : e));
    if (form.cost) addFinanceEntry({ date: form.date, flow: "expense", category: "تعمیرات ساختمان", account: form.account, amount: Number(form.cost) || 0, note: form.desc });
    setForm({ desc: "", cost: "", date: todayISO(), account: accounts[0] || "" }); setOpenId(null);
  };
  const addEquipment = () => { if (!newEq.name) return; setEquipment((eqs) => eqs.concat([{ id: uid(), name: newEq.name, intervalDays: Number(newEq.intervalDays) || 90, lastChecked: todayISO(), repairs: [] }])); setNewEq({ name: "", intervalDays: "90" }); };

  return h(Niche, null,
    h(SectionTitle, { eyebrow: "پایش تجهیزات", title: "لیست بازرسی و تعمیرات پیشگیرانه" }),
    equipment.map((eq) => {
      const st = equipStatus(eq);
      return h("div", { key: eq.id, style: { background: C.sand, borderRadius: 10, padding: "10px 12px", marginBottom: 8 } },
        h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          h("div", null,
            h("div", { style: { fontWeight: 600, fontSize: 13 } }, eq.name),
            h("div", { style: { fontSize: 11, color: C.inkSoft } }, "هر " + eq.intervalDays + " روز — آخرین بررسی: " + (eq.lastChecked ? jalaliLabel(new Date(eq.lastChecked + "T00:00:00")) : "-") + " — بررسی بعدی: " + nextDateOf(eq))
          ),
          h("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
            h(Pill, { text: st === "ok" ? "سالم" : st === "due" ? "نزدیک زمان بررسی" : "عقب‌افتاده", tone: st }),
            h("button", { style: Object.assign({}, btnStyle, { padding: "5px 10px", fontSize: 11 }), onClick: () => setOpenId(openId === eq.id ? null : eq.id) }, "ثبت بررسی/تعمیر")
          )
        ),
        openId === eq.id ? h("div", { style: { display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" } },
          h("input", { style: inputStyle, placeholder: "شرح (چک شد / تعمیر شد ...)", value: form.desc, onChange: (e) => setForm(Object.assign({}, form, { desc: e.target.value })) }),
          h("input", { style: { ...inputStyle, width: 80 }, placeholder: "هزینه (اختیاری)", value: form.cost, onChange: (e) => setForm(Object.assign({}, form, { cost: e.target.value })) }),
          h("input", { type: "date", style: { ...inputStyle, width: 130 }, value: form.date, onChange: (e) => setForm(Object.assign({}, form, { date: e.target.value })) }),
          h("select", { style: inputStyle, value: form.account, onChange: (e) => setForm(Object.assign({}, form, { account: e.target.value })) }, accounts.map((a) => h("option", { key: a }, a))),
          h("button", { style: btnStyle, onClick: () => submitRepair(eq.id) }, "ثبت")
        ) : null,
        (eq.repairs && eq.repairs.length) ? h("div", { style: { marginTop: 8, fontSize: 11, color: C.inkSoft } },
          "سوابق: " + eq.repairs.slice().reverse().map((r) => r.date + " - " + r.desc + (r.cost ? " (" + r.cost + ")" : "")).join(" | ")
        ) : null
      );
    }),
    h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", marginTop: 10 } },
      h("input", { style: inputStyle, placeholder: "نام تجهیز جدید", value: newEq.name, onChange: (e) => setNewEq(Object.assign({}, newEq, { name: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 100 }, placeholder: "هر چند روز", value: newEq.intervalDays, onChange: (e) => setNewEq(Object.assign({}, newEq, { intervalDays: e.target.value })) }),
      h("button", { style: btnStyle, onClick: addEquipment }, "+")
    )
  );
}

function AccountingTab(props) {
  const finance = props.finance, setFinance = props.setFinance, financeByMonth = props.financeByMonth;
  const incomeByCategory = props.incomeByCategory, expenseByCategory = props.expenseByCategory;
  const accounts = props.accounts, setAccounts = props.setAccounts, balanceByAccount = props.balanceByAccount;

  const [form, setForm] = useState({ date: todayISO(), flow: "income", category: INCOME_CATEGORIES[0], account: accounts[0] || "", amount: "", note: "" });
  const [editAcc, setEditAcc] = useState(null);
  const [accDraft, setAccDraft] = useState("");
  const [newAcc, setNewAcc] = useState("");
  const [range, setRange] = useState({ from: todayISO(), to: todayISO() });

  const addEntry = () => {
    if (!form.amount) return;
    setFinance((f) => f.concat([Object.assign({}, form, { amount: Number(form.amount) || 0, id: uid() })]));
    setForm(Object.assign({}, form, { amount: "", note: "" }));
  };
  const removeEntry = (id) => setFinance((f) => f.filter((e) => e.id !== id));
  const lastFin = financeByMonth[financeByMonth.length - 1];

  const saveAccName = (oldName) => {
    const newName = accDraft.trim();
    if (!newName) return;
    setAccounts((accs) => accs.map((a) => a === oldName ? newName : a));
    setFinance((f) => f.map((e) => e.account === oldName ? Object.assign({}, e, { account: newName }) : e));
    setEditAcc(null);
  };
  const addAccount = () => { if (!newAcc.trim()) return; setAccounts((accs) => accs.concat([newAcc.trim()])); setNewAcc(""); };
  const removeAccount = (a) => setAccounts((accs) => accs.filter((x) => x !== a));

  const rangeEntries = useMemo(() => finance.filter((e) => e.date >= range.from && e.date <= range.to), [finance, range]);
  const rangeIncome = rangeEntries.filter((e) => e.flow === "income").reduce((s, e) => s + Number(e.amount || 0), 0);
  const rangeExpense = rangeEntries.filter((e) => e.flow === "expense").reduce((s, e) => s + Number(e.amount || 0), 0);

  return h(React.Fragment, null,
    h(Niche, { style: { marginBottom: 14 } },
      h(SectionTitle, { eyebrow: "بانک‌ها و صندوق‌ها", title: "موجودی هر حساب" }),
      accounts.map((a) => h("div", { key: a, style: { display: "flex", justifyContent: "space-between", alignItems: "center", background: C.sand, borderRadius: 10, padding: "8px 12px", marginBottom: 6 } },
        editAcc === a
          ? h("div", { style: { display: "flex", gap: 6 } },
              h("input", { style: inputStyle, value: accDraft, onChange: (e) => setAccDraft(e.target.value) }),
              h("button", { style: btnStyle, onClick: () => saveAccName(a) }, "ذخیره")
            )

        h("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
          h("b", { style: { color: C.clay } }, balanceByAccount[a] || 0),
          h("button", { onClick: () => { setEditAcc(a); setAccDraft(a); }, style: { border: "none", background: "none", cursor: "pointer" } }, "✎"),
          h("button", { onClick: () => removeAccount(a), style: { border: "none", background: "none", cursor: "pointer" } }, "🗑")
        )
      )),
      h("div", { style: { display: "flex", gap: 6, marginTop: 8 } },
        h("input", { style: inputStyle, placeholder: "نام حساب/صندوق جدید", value: newAcc, onChange: (e) => setNewAcc(e.target.value) }),
        h("button", { style: btnStyle, onClick: addAccount }, "+")
      )
    ),

    h(Niche, { style: { marginBottom: 14 } },
      h(SectionTitle, { eyebrow: "گزارش مالی", title: "سود و زیان ماهانه" }),
      financeByMonth.length > 0 ? h(MiniChart, { data: financeByMonth, keys: ["درآمد", "هزینه"], colors: [C.clay, C.pomegranate], type: "line" }) : h("div", { style: { fontSize: 12, color: C.inkSoft } }, "هنوز تراکنشی ثبت نشده."),
      lastFin ? h("div", { style: { marginTop: 8, fontSize: 12, background: C.sand, borderRadius: 10, padding: 10 } }, "سود خالص " + lastFin.month + ": " + (lastFin["درآمد"] - lastFin["هزینه"])) : null,
      h("div", { style: { display: "flex", gap: 12, marginTop: 14, flexWrap: "wrap" } },
        h("div", { style: { flex: 1, minWidth: 180 } },
          h("div", { style: { fontWeight: 700, fontSize: 12.5, marginBottom: 6 } }, "درآمد به تفکیک نوع"),

  const [newItem, setNewItem] = useState({ name: "", qty: "", min: "", unit: "", cost: "", category: EXPENSE_CATEGORIES[0], account: accounts[0] || "" });
  const [noteDraft, setNoteDraft] = useState({});

  const addItem = () => {
    if (!newItem.name) return;
    setInventory((inv) => inv.concat([{ id: uid(), name: newItem.name, qty: Number(newItem.qty) || 0, min: Number(newItem.min) || 0, unit: newItem.unit || "عدد", log: [] }]));
    if (newItem.cost) addFinanceEntry({ date: todayISO(), flow: "expense", category: newItem.category, account: newItem.account, amount: Number(newItem.cost) || 0, note: "خرید انبار: " + newItem.name });
    setNewItem({ name: "", qty: "", min: "", unit: "", cost: "", category: EXPENSE_CATEGORIES[0], account: accounts[0] || "" });
  };
  const removeItem = (id) => setInventory((inv) => inv.filter((i) => i.id !== id));
  const bump = (id, d) => {
    const note = noteDraft[id] || "";
    setInventory((inv) => inv.map((it) => it.id === id ? Object.assign({}, it, { qty: Math.max(0, Number(it.qty) + d), log: (it.log || []).concat([{ id: uid(), date: todayISO(), change: d, note: note }]) }) : it));
    setNoteDraft(Object.assign({}, noteDraft, { [id]: "" }));
  };

  return h(Niche, null,
    h(SectionTitle, { eyebrow: "موجودی انبار", title: "کالاها، ورود/خروج، و نقطه سفارش مجدد" }),
    inventory.map((it) => {
      const low = Number(it.qty) < Number(it.min);
      return h("div", { key: it.id, style: { background: C.sand, borderRadius: 10, padding: "10px 12px", marginBottom: 6 } },
        h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          h("div", null, h("div", { style: { fontWeight: 600, fontSize: 13 } }, it.name), h("div", { style: { fontSize: 11, color: C.inkSoft } }, "حداقل: " + it.min + " " + it.unit)),
          h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
            low ? h(Pill, { text: "کمبود", tone: "overdue" }) : null,
            h("button", { onClick: () => bump(it.id, -1), style: btnCircle }, "-"),
            h("div", { style: { minWidth: 30, textAlign: "center", fontWeight: 700 } }, it.qty),
            h("button", { onClick: () => bump(it.id, 1), style: btnCircle }, "+"),
            h("button", { onClick: () => removeItem(it.id), style: { border: "none", background: "none", cursor: "pointer" } }, "🗑")
          )
        ),
        h("input", { style: { ...inputStyle, width: "100%", marginTop: 6 }, placeholder: "یادداشت ورود/خروج بعدی (اختیاری، مثلاً: مصرف برای اتاق مراکش)", value: noteDraft[it.id] || "", onChange: (e) => setNoteDraft(Object.assign({}, noteDraft, { [it.id]: e.target.value })) }),
        (it.log && it.log.length) ? h("div", { style: { fontSize: 10.5, color: C.inkSoft, marginTop: 6 } },
          "آخرین تغییرات: " + it.log.slice(-3).reverse().map((l) => l.date + " (" + (l.change > 0 ? "+" : "") + l.change + (l.note ? " - " + l.note : "") + ")").join(" | ")
        ) : null
      );
    }),
    h("div", { style: { fontWeight: 700, fontSize: 12.5, marginTop: 12, marginBottom: 6 } }, "افزودن کالای جدید"),
    h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
      h("input", { style: inputStyle, placeholder: "نام کالا", value: newItem.name, onChange: (e) => setNewItem(Object.assign({}, newItem, { name: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 60 }, placeholder: "موجودی", value: newItem.qty, onChange: (e) => setNewItem(Object.assign({}, newItem, { qty: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 60 }, placeholder: "حداقل", value: newItem.min, onChange: (e) => setNewItem(Object.assign({}, newItem, { min: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 55 }, placeholder: "واحد", value: newItem.unit, onChange: (e) => setNewItem(Object.assign({}, newItem, { unit: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 80 }, placeholder: "هزینه خرید (اختیاری)", value: newItem.cost, onChange: (e) => setNewItem(Object.assign({}, newItem, { cost: e.target.value })) }),
      h("select", { style: inputStyle, value: newItem.category, onChange: (e) => setNewItem(Object.assign({}, newItem, { category: e.target.value })) }, EXPENSE_CATEGORIES.map((c) => h("option", { key: c }, c))),
      h("select", { style: inputStyle, value: newItem.account, onChange: (e) => setNewItem(Object.assign({}, newItem, { account: e.target.value })) }, accounts.map((a) => h("option", { key: a }, a))),
      h("button", { style: btnStyle, onClick: addItem }, "+")
    ),
    h("div", { style: { fontSize: 11, color: C.inkSoft, marginTop: 6 } }, "اگر هزینهٔ خرید وارد شود، خودکار در حسابداری با دسته و حساب انتخابی ثبت می‌شود.")
  );
}

function CarbonTab(props) {
  const carbon = props.carbon, setCarbon = props.setCarbon, carbonSeries = props.carbonSeries;
  const defaultMonthKey = todayISO().slice(0, 7);
  const [form, setForm] = useState({ monthKey: defaultMonthKey, water: "", electricity: "", gas: "" });
  const addReading = () => {
    if (!form.electricity && !form.gas && !form.water) return;
    setCarbon((c) => c.filter((r) => r.monthKey !== form.monthKey).concat([Object.assign({}, form, { id: uid() })]));
    setForm({ monthKey: defaultMonthKey, water: "", electricity: "", gas: "" });
  };
  const last = carbonSeries[carbonSeries.length - 1];
  return h(Niche, null,
    h(SectionTitle, { eyebrow: "مصرف انرژی", title: "روند ردپای کربن ماهانه (kg CO₂)" }),
    carbonSeries.length > 0 ? h(MiniChart, { data: carbonSeries, keys: ["کربن"], colors: [C.sage], type: "line" }) : h("div", { style: { fontSize: 12, color: C.inkSoft } }, "هنوز قرائتی ثبت نشده."),
    last ? h("div", { style: { marginTop: 10, background: C.sand, borderRadius: 10, padding: 10, fontSize: 12 } },
      h("div", null, "ماه " + last.monthKey + " — مجموع: " + last["کربن"] + " kg — تعداد مهمان‌شب: " + last.guestNights),
      last.perGuest != null
        ? h("div", { style: { marginTop: 4, fontWeight: 700, color: (last.perGuest >= CO2_BENCHMARK_LOW && last.perGuest <= CO2_BENCHMARK_HIGH) ? C.sage : C.pomegranate } },
            (last.perGuest.toFixed(1)) + " kg به‌ازای هر مهمان‌شب — " + ((last.perGuest >= CO2_BENCHMARK_LOW && last.perGuest <= CO2_BENCHMARK_HIGH) ? "در محدودهٔ مجاز جهانی (۸ تا ۱۸ کیلوگرم)" : (last.perGuest > CO2_BENCHMARK_HIGH ? "بالاتر از محدودهٔ مجاز — نیاز به کاهش مصرف" : "پایین‌تر از میانگین جهانی — عالی!"))
          )
        : h("div", { style: { marginTop: 4, color: C.inkSoft } }, "برای این ماه هنوز رزروی ثبت نشده تا سرانه محاسبه شود.")
    ) : null,
    h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", marginTop: 12 } },
      h("input", { type: "month", style: inputStyle, value: form.monthKey, onChange: (e) => setForm(Object.assign({}, form, { monthKey: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 80 }, placeholder: "آب (m³)", value: form.water, onChange: (e) => setForm(Object.assign({}, form, { water: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 80 }, placeholder: "برق (kWh)", value: form.electricity, onChange: (e) => setForm(Object.assign({}, form, { electricity: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 80 }, placeholder: "گاز (m³)", value: form.gas, onChange: (e) => setForm(Object.assign({}, form, { gas: e.target.value })) }),
      h("button", { style: btnStyle, onClick: addReading }, "ثبت ماه")
    ),
    h("div", { style: { fontSize: 10.5, color: C.inkSoft, marginTop: 8 } }, "منبع محدودهٔ مجاز: میانگین صنعت هتلداری بوتیک/کوچک (Cornell-Greenview HCMI، DEFRA) — ۸ تا ۱۸ کیلوگرم CO₂ به‌ازای هر مهمان در هر شب.")
  );
}

function EventsTab(props) {
  const events = props.events, setEvents = props.setEvents;
  const toggle = (id) => setEvents((evs) => evs.map((e) => e.id === id ? Object.assign({}, e, { status: e.status === "done" ? "planned" : "done" }) : e));
  const removeEvent = (id) => setEvents((evs) => evs.filter((e) => e.id !== id));
  const total = events.reduce((s, e) => s + Number(e.budget || 0), 0);
  return h(Niche, null,
    h(SectionTitle, { eyebrow: "تقویم سالانه", title: "رویدادهای پیشنهادی و بودجه" }),
    events.map((ev) => h("div", { key: ev.id, style: { display: "flex", justifyContent: "space-between", alignItems: "center", background: C.sand, borderRadius: 10, padding: "9px 12px", marginBottom: 6 } },
      h("div", null, h("div", { style: { fontWeight: 600, fontSize: 13 } }, ev.title), h("div", { style: { fontSize: 11, color: C.inkSoft } }, "فصل: " + ev.season + " — بودجه: " + ev.budget)),
      h("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
        h("button", { onClick: () => toggle(ev.id), style: { border: "none", background: "none", cursor: "pointer" } }, h(Pill, { text: ev.status === "done" ? "برگزار شد" : "برنامه‌ریزی‌شده", tone: ev.status })),
        h("button", { onClick: () => removeEvent(ev.id), style: { border: "none", background: "none", cursor: "pointer" } }, "🗑")
      )
    )),
    h("div", { style: { fontWeight: 700, color: C.clay, marginTop: 8 } }, "جمع بودجه سالانه: " + total)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>
</body>
</html>
