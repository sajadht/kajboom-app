function gregorianToJalali(gy, gm, gd) {
  const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let jy = (gy <= 1600) ? 0 : 979;
  gy -= (gy <= 1600) ? 621 : 1600;
  const gy2 = (gm > 2) ? (gy + 1) : gy;
  let days = (365*gy) + (Math.floor((gy2+3)/4)) - (Math.floor((gy2+99)/100)) + (Math.floor((gy2+399)/400)) - 80 + gd + g_d_m[gm-1];
  jy += 33*Math.floor(days/12053);
  days %= 12053;
  jy += 4*Math.floor(days/1461);
  days %= 1461;
  if (days > 365) { jy += Math.floor((days-1)/365); days = (days-1)%365; }
  let jm, jd;
  if (days < 186) { jm = 1 + Math.floor(days/31); jd = 1 + (days%31); }
  else { jm = 7 + Math.floor((days-186)/30); jd = 1 + ((days-186)%30); }
  return [jy, jm, jd];
}
function isoLocal(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function getSaturday(d) {
  const day = d.getDay(); // 0=Sun..6=Sat
  const diff = (day + 1) % 7; // days since Saturday
  const r = new Date(d);
  r.setDate(d.getDate() - diff);
  r.setHours(0,0,0,0);
  return r;
}
function jalaliLabel(d) {
  const j = gregorianToJalali(d.getFullYear(), d.getMonth()+1, d.getDate());
  return j[2] + " " + MONTHS[j[1]-1];
}
function jalaliMonthKey(dateISO) {
  const d = new Date(dateISO + "T00:00:00");
  const j = gregorianToJalali(d.getFullYear(), d.getMonth()+1, d.getDate());
  return { key: j[0] + "-" + j[1], label: MONTHS[j[1]-1] + " " + j[0] };
}
function todayISO() { return isoLocal(new Date()); }

async function callClaudeAPI(apiKey, prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {

      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",

    body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 500, messages: [{ role: "user", content: prompt }] })

  if (data.error) throw new Error(data.error.message || "خطای API");
  return (data.content || []).map((b) => b.text || "").join("\n");
}

function useDoc(docId, initial) {
  const [value, setValue] = useState(initial);
  const [loaded, setLoaded] = useState(false);
  const [err, setErr] = useState(null);
  useEffect(() => {
    const ref = db.collection("kajboom").doc(docId);
    const unsub = ref.onSnapshot(
      (snap) => {
        if (snap.exists) setValue(snap.data().value);
        else ref.set({ value: initial }).catch(() => {});
        setLoaded(true);
      },
      (e) => { setErr(String(e)); setLoaded(true); }
    );
    return unsub;
  }, [docId]);
  const update = (next) => {
    const resolved = typeof next === "function" ? next(value) : next;
    setValue(resolved);
    db.collection("kajboom").doc(docId).set({ value: resolved }).catch((e) => setErr(String(e)));
  };
  return [value, update, loaded, err];
}

function MiniChart(props) {
  const data = props.data, keys = props.keys, colors = props.colors, type = props.type || "bar", height = props.height || 200;
  if (!data.length) return null;
  const max = Math.max(1, ...data.flatMap((d) => keys.map((k) => Number(d[k]) || 0)));
  const w = 100 / data.length;
  const shapes = [];
  if (type === "bar") {
    data.forEach((d, i) => {
      keys.forEach((k, ki) => {
        const val = Number(d[k]) || 0;
        const bw = (w / keys.length) * 0.7;
        const x = i * w + ki * (w / keys.length) + (w / keys.length - bw) / 2;
        const hgt = (val / max) * 100;
        shapes.push(h("rect", { key: k + i, x: x * 3, y: 110 - hgt, width: bw * 3, height: hgt, fill: colors[ki], rx: "2" }));
      });
    });
  } else if (type === "line") {
    keys.forEach((k, ki) => {
      const pts = data.map((d, i) => (i * w * 3 + w * 1.5) + "," + (110 - (Number(d[k]) || 0) / max * 100)).join(" ");
      shapes.push(h("polyline", { key: k, points: pts, fill: "none", stroke: colors[ki], strokeWidth: "2" }));
    });
  }
  return h("div", null,
    h("svg", { viewBox: "0 0 300 120", style: { width: "100%", height: height }, preserveAspectRatio: "none" }, shapes),
    h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 9, color: C.inkSoft, marginTop: 2 } },
      data.map((d) => h("span", { key: d.month }, d.month))
    ),
    h("div", { style: { display: "flex", gap: 10, marginTop: 4, fontSize: 11 } },
      keys.map((k, i) => h("span", { key: k, style: { color: colors[i] } }, "■ " + k))
    )
  );
}

function App() {
  const [tab, setTab] = useState("overview");
  const rr = useDoc("rooms", DEFAULT_ROOMS); const rooms = rr[0], setRooms = rr[1], roomsL = rr[2];
  const sy = useDoc("stays", []); const stays = sy[0], setStays = sy[1], syL = sy[2];
  const eq = useDoc("equipment", DEFAULT_EQUIPMENT); const equipment = eq[0], setEquipment = eq[1], eqL = eq[2];
  const iv = useDoc("inventory", DEFAULT_INVENTORY); const inventory = iv[0], setInventory = iv[1], invL = iv[2];
  const fn = useDoc("finance", DEFAULT_FINANCE); const finance = fn[0], setFinance = fn[1], finL = fn[2], finErr = fn[3];
  const cb = useDoc("carbon", DEFAULT_CARBON); const carbon = cb[0], setCarbon = cb[1], carbonL = cb[2];
  const ev = useDoc("events", DEFAULT_EVENTS); const events = ev[0], setEvents = ev[1], evL = ev[2];
  const gu = useDoc("guests", []); const guests = gu[0], setGuests = gu[1], guL = gu[2];
  const st = useDoc("settings", { apiKey: "" }); const settings = st[0], setSettings = st[1], stL = st[2];
  const gr = useDoc("growth", { suggestions: [] }); const growth = gr[0], setGrowth = gr[1], grL = gr[2];
  const ac = useDoc("accounts", DEFAULT_ACCOUNTS); const accounts = ac[0], setAccounts = ac[1], accL = ac[2];

  const addFinanceEntry = (e) => setFinance((f) => f.concat([Object.assign({}, e, { id: uid() })]));
  const allLoaded = roomsL && syL && eqL && invL && finL && carbonL && evL && accL && stL && grL && guL;

  const financeByMonth = useMemo(() => {
    const map = {};
    finance.forEach((e) => {
      const mk = jalaliMonthKey(e.date || todayISO());
      if (!map[mk.key]) map[mk.key] = { key: mk.key, month: mk.label, "درآمد": 0, "هزینه": 0 };
      if (e.flow === "income") map[mk.key]["درآمد"] += Number(e.amount) || 0;
      else map[mk.key]["هزینه"] += Number(e.amount) || 0;
    });
    return Object.values(map).sort((a, b) => a.key < b.key ? -1 : 1);
  }, [finance]);

  const incomeByCategory = useMemo(() => {
    const m = {};
    finance.filter((e) => e.flow === "income").forEach((e) => { m[e.category] = (m[e.category] || 0) + Number(e.amount || 0); });
    return m;
  }, [finance]);
  const expenseByCategory = useMemo(() => {
    const m = {};
    finance.filter((e) => e.flow === "expense").forEach((e) => { m[e.category] = (m[e.category] || 0) + Number(e.amount || 0); });
    return m;
  }, [finance]);
  const balanceByAccount = useMemo(() => {
    const m = {};
    accounts.forEach((a) => { m[a] = 0; });
    finance.forEach((e) => {
      if (!e.account) return;
      m[e.account] = (m[e.account] || 0) + (e.flow === "income" ? Number(e.amount || 0) : -Number(e.amount || 0));
    });
    return m;
  }, [finance, accounts]);
  const guestNightsForMonthKey = (monthKey) => {
    let total = 0;
    stays.forEach((s) => {
      let d = new Date(s.checkIn + "T00:00:00");
      const end = new Date(s.checkOut + "T00:00:00");
      while (d < end) {
        if (isoLocal(d).slice(0, 7) === monthKey) total += Number(s.guests) || 0;
        d.setDate(d.getDate() + 1);
      }
    });
    return total;
  };
  const CO2_BENCHMARK_PER_GUEST_NIGHT = 15; // kg CO2e, mid-point of the 8-18 kg/guest-night range typical for boutique/limited-service guesthouses (industry benchmarks: Cornell/Greenview HCMI, DEFRA)
  const carbonSeries = useMemo(() => carbon.slice().sort((a, b) => a.monthKey < b.monthKey ? -1 : 1).map((r) => {
    const totalCO2 = Number(r.electricity) * 0.5 + Number(r.gas) * 1.95 + Number(r.water) * 0.45;
    const guestNights = guestNightsForMonthKey(r.monthKey);
    const perGuest = guestNights > 0 ? totalCO2 / guestNights : null;
    return Object.assign({}, r, { month: r.monthKey, "کربن": +totalCO2.toFixed(0), guestNights: guestNights, perGuest: perGuest });
  }), [carbon, stays]);


  const equipStatus = (e) => {
    if (!e.intervalDays || !e.lastChecked) return "due";
    const next = new Date(e.lastChecked + "T00:00:00");
    next.setDate(next.getDate() + Number(e.intervalDays));
    const today = new Date(); today.setHours(0,0,0,0);
    const diffDays = Math.floor((next - today) / 86400000);
    if (diffDays < 0) return "overdue";

    return "ok";

      }, h("span", null, t.emoji), t.label))
    ),

        h("div", { style: { display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 } },

          h(KPICard, { emoji: "💰", label: "سود خالص", value: lastFin["درآمد"] - lastFin["هزینه"], tone: C.clay }),
          h(KPICard, { emoji: "🔧", label: "تعمیرات عقب‌افتاده", value: overdueEquip, tone: C.pomegranate }),
          h(KPICard, { emoji: "📦", label: "کالای رو به اتمام", value: lowStock.length, sub: lowStock.map((i) => i.name).join("، ") || "کافی است", tone: C.gold }),
          h(KPICard, { emoji: "🌿", label: "ردپای کربن اخیر", value: lastCarbon["کربن"] + " kg", tone: C.sage })
        ),
        h(Niche, null,
          h(SectionTitle, { eyebrow: "روند مالی", title: "درآمد و هزینه ماهانه" }),

        )
      ) : null,

      tab === "reservations" ? h(ReservationsTab, { rooms: rooms, setRooms: setRooms, stays: stays, setStays: setStays, addFinanceEntry: addFinanceEntry, accounts: accounts, guests: guests, setGuests: setGuests }) : null,
      tab === "guests" ? h(GuestsTab, { guests: guests, setGuests: setGuests, stays: stays, setStays: setStays, rooms: rooms, addFinanceEntry: addFinanceEntry, accounts: accounts }) : null,
      tab === "maintenance" ? h(MaintenanceTab, { equipment: equipment, setEquipment: setEquipment, addFinanceEntry: addFinanceEntry, accounts: accounts, equipStatus: equipStatus }) : null,
      tab === "accounting" ? h(AccountingTab, { finance: finance, setFinance: setFinance, financeByMonth: financeByMonth, incomeByCategory: incomeByCategory, expenseByCategory: expenseByCategory, accounts: accounts, setAccounts: setAccounts, balanceByAccount: balanceByAccount }) : null,
      tab === "inventory" ? h(InventoryTab, { inventory: inventory, setInventory: setInventory, addFinanceEntry: addFinanceEntry, accounts: accounts }) : null,

function ReservationsTab(props) {
  const rooms = props.rooms, setRooms = props.setRooms, stays = props.stays, setStays = props.setStays, addFinanceEntry = props.addFinanceEntry, accounts = props.accounts, guests = props.guests, setGuests = props.setGuests;
  const [editRoom, setEditRoom] = useState(null);
  const [priceDraft, setPriceDraft] = useState("");
  const [logAccount, setLogAccount] = useState(accounts[0] || "");
  const [weekStart, setWeekStart] = useState(() => getSaturday(new Date()));
  const [openStays, setOpenStays] = useState({}); // roomId -> { checkIn, guests, name, phone, notes }
  const [editing, setEditing] = useState(null); // { stay, roomName } for finalized stays
  const [editForm, setEditForm] = useState({ guests: "1", name: "", phone: "", notes: "" });

  const weekDates = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 7; i++) { const d = new Date(weekStart); d.setDate(weekStart.getDate() + i); arr.push(d); }
    return arr;
  }, [weekStart]);

  const stayAt = (roomId, dateISO) => stays.find((s) => s.roomId === roomId && dateISO >= s.checkIn && dateISO < s.checkOut);
  const checkoutHereFrom = (roomId, dateISO) => stays.find((s) => s.roomId === roomId && s.checkOut === dateISO);

  const weeklyTotal = useMemo(() => {
    let s = 0;
    rooms.forEach((r) => weekDates.forEach((d) => { const st = stayAt(r.id, isoLocal(d)); if (st) s += (Number(st.guests) || 0) * r.pricePerPerson; }));
    return s;
    // eslint-disable-next-line
  }, [rooms, stays, weekDates]);

  const savePrice = (id) => { setRooms((rs) => rs.map((r) => r.id === id ? Object.assign({}, r, { pricePerPerson: Number(priceDraft) || r.pricePerPerson }) : r)); setEditRoom(null); };
  const logToAccounting = () => { if (weeklyTotal > 0) addFinanceEntry({ date: todayISO(), flow: "income", category: "اقامت", account: logAccount, amount: weeklyTotal, note: "درآمد رزرو هفتگی" }); };

  const findGuestByPhone = (phone) => {
    const p = (phone || "").trim();
    if (!p) return null;
    return guests.find((g) => g.phone === p) || null;
  };
  const upsertGuestDirectory = (guestData, roomName, dateISO) => {
    const phone = (guestData.phone || "").trim();
    if (!phone) return;
    const visit = { date: dateISO, roomName: roomName, guests: Number(guestData.guests) || 0 };
    setGuests((gs) => {
      const idx = gs.findIndex((g) => g.phone === phone);
      if (idx === -1) return gs.concat([{ id: uid(), name: guestData.name || "بدون نام", phone: phone, notes: guestData.notes || "", visits: [visit] }]);
      const updated = gs.slice();
      const g = updated[idx];
      updated[idx] = Object.assign({}, g, { name: guestData.name || g.name, notes: guestData.notes || g.notes, visits: (g.visits || []).concat([visit]) });
      return updated;
    });
  };

  const updateOpenField = (roomId, field, value) => setOpenStays((o) => Object.assign({}, o, { [roomId]: Object.assign({}, o[roomId], { [field]: value }) }));
  const autofillOpenFromPhone = (roomId) => {
    const known = findGuestByPhone(openStays[roomId].phone);
    if (known) updateOpenField(roomId, "name", known.name), updateOpenField(roomId, "notes", known.notes || "");
  };
  const cancelOpenStay = (roomId) => setOpenStays((o) => { const n = Object.assign({}, o); delete n[roomId]; return n; });

  const onCellClick = (room, d) => {
    const dateISO = isoLocal(d);
    const occupied = stayAt(room.id, dateISO);
    if (occupied) {
      setEditing({ stay: occupied, roomName: room.name });
      setEditForm({ guests: String(occupied.guests || 1), name: occupied.name || "", phone: occupied.phone || "", notes: occupied.notes || "" });
      return;
    }
    const open = openStays[room.id];
    if (open) {
      if (open.checkIn === dateISO) { cancelOpenStay(room.id); return; }
      if (dateISO > open.checkIn) {
        const stay = { id: uid(), roomId: room.id, checkIn: open.checkIn, checkOut: dateISO, guests: Number(open.guests) || 1, name: open.name, phone: open.phone, notes: open.notes, settled: false };
        setStays((s) => s.concat([stay]));
        upsertGuestDirectory(open, room.name, open.checkIn);
        cancelOpenStay(room.id);
        return;
      }
      setOpenStays((o) => Object.assign({}, o, { [room.id]: Object.assign({}, open, { checkIn: dateISO }) }));
      return;
    }
    setOpenStays((o) => Object.assign({}, o, { [room.id]: { checkIn: dateISO, guests: "1", name: "", phone: "", notes: "" } }));
  };

  const saveEditStay = () => {
    setStays((s) => s.map((x) => x.id === editing.stay.id ? Object.assign({}, x, { guests: Number(editForm.guests) || 1, name: editForm.name, phone: editForm.phone, notes: editForm.notes }) : x));
    upsertGuestDirectory(editForm, editing.roomName, editing.stay.checkIn);
    setEditing(null);
  };
  const cancelFinalizedStay = () => { setStays((s) => s.filter((x) => x.id !== editing.stay.id)); setEditing(null); };

  const weekLabel = jalaliLabel(weekDates[0]) + " تا " + jalaliLabel(weekDates[6]);
  const openRoomIds = Object.keys(openStays);

  return h(React.Fragment, null,
    h(Niche, { style: { marginBottom: 14 } },
      h(SectionTitle, { eyebrow: "قیمت‌گذاری", title: "اتاق‌ها (قیمت هر نفر)" }),
      rooms.map((r) => h("div", { key: r.id, style: { display: "flex", justifyContent: "space-between", alignItems: "center", background: C.sand, borderRadius: 10, padding: "8px 12px", marginBottom: 6 } },
        h("div", null,
          h("div", { style: { fontWeight: 600, fontSize: 13 } }, r.name),
          h("div", { style: { fontSize: 11, color: C.inkSoft } }, (r.type === "master" ? "مستر" : "غیرمستر") + " — ظرفیت " + r.capacity + " نفر")
        ),
        editRoom === r.id
          ? h("div", { style: { display: "flex", gap: 6 } },
              h("input", { style: Object.assign({}, inputStyle, { width: 80 }), value: priceDraft, onChange: (e) => setPriceDraft(e.target.value) }),
              h("button", { style: btnStyle, onClick: () => savePrice(r.id) }, "ذخیره")
            )
          : h("button", { onClick: () => { setEditRoom(r.id); setPriceDraft(String(r.pricePerPerson)); }, style: { border: "none", background: "none", cursor: "pointer", fontWeight: 700, color: C.clay } }, r.pricePerPerson + " ✎")
      ))
    ),
    h(Niche, null,
      h(SectionTitle, { eyebrow: "تقویم ورود/خروج", title: "کلیک اول = ورود (فرم زیر باز می‌شود)، کلیک دوم روی روز بعدی = خروج" }),
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 } },
        h("button", { style: Object.assign({}, btnStyle, { padding: "5px 10px", fontSize: 11 }), onClick: () => setWeekStart((w) => { const n = new Date(w); n.setDate(w.getDate() - 7); return n; }) }, "◀ هفتهٔ قبل"),
        h("div", { style: { fontSize: 12.5, fontWeight: 700, color: C.ink } }, weekLabel),
        h("button", { style: Object.assign({}, btnStyle, { padding: "5px 10px", fontSize: 11 }), onClick: () => setWeekStart((w) => { const n = new Date(w); n.setDate(w.getDate() + 7); return n; }) }, "هفتهٔ بعد ▶")
      ),
      h("div", { style: { overflowX: "auto" } },
        h("table", { style: { borderCollapse: "collapse", width: "100%", fontSize: 12 } },
          h("thead", null, h("tr", null, h("th", { style: { padding: 6 } }, "اتاق"), weekDates.map((d, i) => h("th", { key: i, style: { padding: 6, color: C.inkSoft, fontWeight: 500 } }, DAYS[i] + " – " + jalaliLabel(d))))),
          h("tbody", null, rooms.map((r) => h("tr", { key: r.id },
            h("td", { style: { padding: 6, fontWeight: 600 } }, r.name),
            weekDates.map((d, di) => {
              const dateISO = isoLocal(d);
              const stay = stayAt(r.id, dateISO);
              const departing = checkoutHereFrom(r.id, dateISO);
              const open = openStays[r.id] && openStays[r.id].checkIn === dateISO;
              const lines = [];
              if (departing) lines.push(h("div", { key: "out", style: { color: C.pomegranate, fontWeight: 700 } }, "خروج " + (departing.name ? departing.name.split(" ")[0] : "")));
              if (stay) lines.push(h("div", { key: "in", style: { color: "#fff" } }, (stay.checkIn === dateISO ? "ورود " : "") + stay.guests + " نفر" + (stay.name ? " " + stay.name.split(" ")[0] : "")));
              else if (open) lines.push(h("div", { key: "pending", style: { color: "#fff" } }, "ورود ✓"));
              else if (!departing) lines.push(h("div", { key: "empty" }, "خالی"));
              let bg = C.sandDark;
              if (stay) bg = C.claySoft; else if (open) bg = C.gold;
              return h("td", { key: di, style: { padding: 4, textAlign: "center" } },
                h("button", { onClick: () => onCellClick(r, d), style: { border: "none", cursor: "pointer", borderRadius: 8, padding: "6px 4px", width: 74, minHeight: 40, background: bg, color: C.inkSoft, fontSize: 9.5, lineHeight: 1.3 } }, lines)
              );
            })
          )))
        )
      ),
      h("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 12, flexWrap: "wrap", gap: 8 } },
        h("div", { style: { fontWeight: 700, color: C.clay, fontSize: 12.5 } }, "درآمد تخمینی این هفته: " + weeklyTotal),
        h("div", { style: { display: "flex", gap: 6 } },
          h("select", { style: inputStyle, value: logAccount, onChange: (e) => setLogAccount(e.target.value) }, accounts.map((a) => h("option", { key: a }, a))),
          h("button", { style: btnStyle, onClick: logToAccounting }, "ثبت در حسابداری")
        )
      )
    ),

    openRoomIds.map((rid) => {
      const room = rooms.find((r) => r.id === rid);
      const o = openStays[rid];
      const known = findGuestByPhone(o.phone);
      return h(Niche, { key: rid, style: { marginTop: 14, border: "1px solid " + C.gold } },
        h(SectionTitle, { eyebrow: (room ? room.name : "") + " — ورود: " + jalaliLabel(new Date(o.checkIn + "T00:00:00")), title: "مشخصات مهمان (هنوز خروج مشخص نشده — روی یک روز دیگر بزنید)" }),
        h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
          h("input", { style: Object.assign({}, inputStyle, { width: 70 }), placeholder: "تعداد نفر", value: o.guests, onChange: (e) => updateOpenField(rid, "guests", e.target.value) }),
          h("input", { style: inputStyle, placeholder: "نام مهمان", value: o.name, onChange: (e) => updateOpenField(rid, "name", e.target.value) }),
          h("input", { style: inputStyle, placeholder: "شماره تماس", value: o.phone, onChange: (e) => updateOpenField(rid, "phone", e.target.value) }),
          known ? h("button", { onClick: () => autofillOpenFromPhone(rid), style: { ...btnStyle, background: C.sage } }, "مهمان قبلی — پر کن") : null
        ),
        known ? h("div", { style: { fontSize: 11, color: C.sage, marginTop: 6 } }, "این مهمان قبلاً " + (known.visits || []).length + " بار اومده.") : null,
        h("textarea", { style: { ...inputStyle, width: "100%", marginTop: 8, minHeight: 50, fontFamily: "inherit" }, placeholder: "علاقه‌مندی‌ها و نکات", value: o.notes, onChange: (e) => updateOpenField(rid, "notes", e.target.value) }),
        h("div", { style: { display: "flex", gap: 6, marginTop: 10 } },
          h("button", { style: Object.assign({}, btnStyle, { background: C.pomegranate }), onClick: () => cancelOpenStay(rid) }, "انصراف از این ورود")
        )
      );
    }),

    editing ? h(Niche, { style: { marginTop: 14 } },
      h(SectionTitle, {
        eyebrow: editing.roomName + " — " + jalaliLabel(new Date(editing.stay.checkIn + "T00:00:00")) + " تا " + jalaliLabel(new Date(editing.stay.checkOut + "T00:00:00")),
        title: "جزئیات رزرو"
      }),
      h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
        h("input", { style: Object.assign({}, inputStyle, { width: 70 }), placeholder: "تعداد نفر", value: editForm.guests, onChange: (e) => setEditForm(Object.assign({}, editForm, { guests: e.target.value })) }),
        h("input", { style: inputStyle, placeholder: "نام مهمان", value: editForm.name, onChange: (e) => setEditForm(Object.assign({}, editForm, { name: e.target.value })) }),
        h("input", { style: inputStyle, placeholder: "شماره تماس", value: editForm.phone, onChange: (e) => setEditForm(Object.assign({}, editForm, { phone: e.target.value })) })
      ),
      h("textarea", { style: { ...inputStyle, width: "100%", marginTop: 8, minHeight: 50, fontFamily: "inherit" }, placeholder: "علاقه‌مندی‌ها و نکات", value: editForm.notes, onChange: (e) => setEditForm(Object.assign({}, editForm, { notes: e.target.value })) }),
      h("div", { style: { display: "flex", gap: 6, marginTop: 10 } },
        h("button", { style: btnStyle, onClick: saveEditStay }, "ذخیره تغییرات"),
        h("button", { style: Object.assign({}, btnStyle, { background: C.pomegranate }), onClick: cancelFinalizedStay }, "لغو این رزرو"),
        h("button", { style: Object.assign({}, btnStyle, { background: C.inkSoft }), onClick: () => setEditing(null) }, "بستن")
      )
    ) : null
  );
}

function GuestsTab(props) {
  const guests = props.guests, setGuests = props.setGuests;
  const stays = props.stays, setStays = props.setStays, rooms = props.rooms, addFinanceEntry = props.addFinanceEntry, accounts = props.accounts;
  const [query, setQuery] = useState("");
  const [editId, setEditId] = useState(null);
  const [draft, setDraft] = useState({ name: "", phone: "", notes: "" });
  const [settlingId, setSettlingId] = useState(null);
  const [settleForm, setSettleForm] = useState({ room: "", food: "", shop: "", discount: "", account: accounts[0] || "" });

  const filtered = guests.filter((g) => {
    const q = query.trim();
    if (!q) return true;
    return (g.name || "").indexOf(q) !== -1 || (g.phone || "").indexOf(q) !== -1;
  }).slice().sort((a, b) => {
    const av = (a.visits && a.visits.length) ? a.visits[a.visits.length - 1].date : "";
    const bv = (b.visits && b.visits.length) ? b.visits[b.visits.length - 1].date : "";
    return av < bv ? 1 : -1;
  });

  const startEdit = (g) => { setEditId(g.id); setDraft({ name: g.name, phone: g.phone, notes: g.notes || "" }); };
  const saveEdit = () => { setGuests((gs) => gs.map((g) => g.id === editId ? Object.assign({}, g, draft) : g)); setEditId(null); };
  const removeGuest = (id) => setGuests((gs) => gs.filter((g) => g.id !== id));

  const nightsOf = (stay) => Math.max(1, Math.round((new Date(stay.checkOut + "T00:00:00") - new Date(stay.checkIn + "T00:00:00")) / 86400000));
  const getUnsettledStays = (guest) => stays.filter((s) => s.phone === guest.phone && !s.settled && s.guests > 0)
    .map((s) => Object.assign({}, s, { room: rooms.find((r) => r.id === s.roomId), nights: nightsOf(s) }))
    .sort((a, b) => a.checkIn < b.checkIn ? -1 : 1);

  const openSettle = (guest) => {
    const pending = getUnsettledStays(guest);
    const roomTotal = pending.reduce((s, st) => s + (st.room ? st.guests * st.nights * st.room.pricePerPerson : 0), 0);
    setSettlingId(guest.id);
    setSettleForm({ room: String(roomTotal), food: "", shop: "", discount: "", account: accounts[0] || "" });
  };

  const finalizeSettle = (guest) => {
    const pending = getUnsettledStays(guest);
    const roomAmt = Number(settleForm.room) || 0;
    const foodAmt = Number(settleForm.food) || 0;
    const shopAmt = Number(settleForm.shop) || 0;
    const discount = Number(settleForm.discount) || 0;
    const date = todayISO();
    let remainingDiscount = discount;
    const applyDiscount = (amt) => { const d = Math.min(remainingDiscount, amt); remainingDiscount -= d; return amt - d; };
    if (roomAmt > 0) addFinanceEntry({ date: date, flow: "income", category: "اقامت", account: settleForm.account, amount: applyDiscount(roomAmt), note: "تسویه اقامت " + guest.name });
    if (foodAmt > 0) addFinanceEntry({ date: date, flow: "income", category: "غذای بیرون", account: settleForm.account, amount: applyDiscount(foodAmt), note: "تسویه غذا " + guest.name });
    if (shopAmt > 0) addFinanceEntry({ date: date, flow: "income", category: "فروشگاه", account: settleForm.account, amount: applyDiscount(shopAmt), note: "تسویه فروشگاه " + guest.name });
    const settledIds = pending.map((st) => st.id);
    setStays((s) => s.map((x) => settledIds.indexOf(x.id) !== -1 ? Object.assign({}, x, { settled: true }) : x));
    setSettlingId(null);
  };

  return h(Niche, null,
    h(SectionTitle, { eyebrow: "دفترچهٔ مهمان‌ها", title: "جستجو بر اساس نام یا شماره تماس" }),
    h("input", { style: { ...inputStyle, width: "100%", marginBottom: 12 }, placeholder: "جستجو...", value: query, onChange: (e) => setQuery(e.target.value) }),
    filtered.length === 0 ? h("div", { style: { fontSize: 12, color: C.inkSoft } }, "مهمانی پیدا نشد.") : null,
    filtered.map((g) => {
      const pending = getUnsettledStays(g);
      return h("div", { key: g.id, style: { background: C.sand, borderRadius: 10, padding: "10px 12px", marginBottom: 8 } },
        editId === g.id
          ? h(React.Fragment, null,
              h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
                h("input", { style: inputStyle, value: draft.name, onChange: (e) => setDraft(Object.assign({}, draft, { name: e.target.value })) }),
                h("input", { style: inputStyle, value: draft.phone, onChange: (e) => setDraft(Object.assign({}, draft, { phone: e.target.value })) })
              ),
              h("textarea", { style: { ...inputStyle, width: "100%", marginTop: 6, minHeight: 50, fontFamily: "inherit" }, value: draft.notes, onChange: (e) => setDraft(Object.assign({}, draft, { notes: e.target.value })) }),
              h("div", { style: { display: "flex", gap: 6, marginTop: 6 } },
                h("button", { style: btnStyle, onClick: saveEdit }, "ذخیره"),
                h("button", { style: { ...btnStyle, background: C.inkSoft }, onClick: () => setEditId(null) }, "انصراف")
              )
            )
          : h(React.Fragment, null,
              h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
                h("div", null,
                  h("div", { style: { fontWeight: 700, fontSize: 13 } }, g.name),
                  h("div", { style: { fontSize: 11, color: C.inkSoft } }, g.phone + " — " + (g.visits ? g.visits.length : 0) + " بار اقامت")
                ),
                h("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
                  pending.length ? h("button", { onClick: () => openSettle(g), style: { ...btnStyle, background: C.gold, fontSize: 11, padding: "5px 10px" } }, "💰 تسویه‌حساب (" + pending.length + " شب)") : h(Pill, { text: "تسویه‌شده", tone: "ok" }),
                  h("button", { onClick: () => startEdit(g), style: { border: "none", background: "none", cursor: "pointer" } }, "✎"),
                  h("button", { onClick: () => removeGuest(g.id), style: { border: "none", background: "none", cursor: "pointer" } }, "🗑")
                )
              ),
              g.notes ? h("div", { style: { fontSize: 12, marginTop: 6, background: "#fff", borderRadius: 8, padding: 8 } }, "📝 " + g.notes) : null,
              (g.visits && g.visits.length) ? h("div", { style: { fontSize: 10.5, color: C.inkSoft, marginTop: 6 } },
                "سوابق: " + g.visits.slice().reverse().slice(0, 5).map((v) => v.date + " (" + v.roomName + "، " + v.guests + " نفر)").join(" | ")
              ) : null,
              settlingId === g.id ? h("div", { style: { marginTop: 10, background: "#fff", borderRadius: 10, padding: 10 } },
                h("div", { style: { fontSize: 12, fontWeight: 700, marginBottom: 6 } }, "تسویه‌حساب خروج"),

function MaintenanceTab(props) {
  const equipment = props.equipment, setEquipment = props.setEquipment, addFinanceEntry = props.addFinanceEntry, accounts = props.accounts, equipStatus = props.equipStatus;
  const [openId, setOpenId] = useState(null);
  const [form, setForm] = useState({ desc: "", cost: "", date: todayISO(), account: accounts[0] || "" });
  const [newEq, setNewEq] = useState({ name: "", intervalDays: "90" });

  const nextDateOf = (e) => {
    if (!e.lastChecked || !e.intervalDays) return "-";
    const d = new Date(e.lastChecked + "T00:00:00");
    d.setDate(d.getDate() + Number(e.intervalDays));
    return jalaliLabel(d);
  };

  const submitRepair = (id) => {
    if (!form.desc) return;
    setEquipment((eqs) => eqs.map((e) => e.id === id ? Object.assign({}, e, { lastChecked: form.date, repairs: (e.repairs || []).concat([{ id: uid(), desc: form.desc, cost: form.cost, date: form.date }]) }) : e));
    if (form.cost) addFinanceEntry({ date: form.date, flow: "expense", category: "تعمیرات ساختمان", account: form.account, amount: Number(form.cost) || 0, note: form.desc });
    setForm({ desc: "", cost: "", date: todayISO(), account: accounts[0] || "" }); setOpenId(null);
  };
  const addEquipment = () => { if (!newEq.name) return; setEquipment((eqs) => eqs.concat([{ id: uid(), name: newEq.name, intervalDays: Number(newEq.intervalDays) || 90, lastChecked: todayISO(), repairs: [] }])); setNewEq({ name: "", intervalDays: "90" }); };

  return h(Niche, null,
    h(SectionTitle, { eyebrow: "پایش تجهیزات", title: "لیست بازرسی و تعمیرات پیشگیرانه" }),
    equipment.map((eq) => {
      const st = equipStatus(eq);
      return h("div", { key: eq.id, style: { background: C.sand, borderRadius: 10, padding: "10px 12px", marginBottom: 8 } },

          h("div", null,
            h("div", { style: { fontWeight: 600, fontSize: 13 } }, eq.name),
            h("div", { style: { fontSize: 11, color: C.inkSoft } }, "هر " + eq.intervalDays + " روز — آخرین بررسی: " + (eq.lastChecked ? jalaliLabel(new Date(eq.lastChecked + "T00:00:00")) : "-") + " — بررسی بعدی: " + nextDateOf(eq))
          ),
          h("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
            h(Pill, { text: st === "ok" ? "سالم" : st === "due" ? "نزدیک زمان بررسی" : "عقب‌افتاده", tone: st }),
            h("button", { style: Object.assign({}, btnStyle, { padding: "5px 10px", fontSize: 11 }), onClick: () => setOpenId(openId === eq.id ? null : eq.id) }, "ثبت بررسی/تعمیر")
          )
        ),
        openId === eq.id ? h("div", { style: { display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" } },
          h("input", { style: inputStyle, placeholder: "شرح (چک شد / تعمیر شد ...)", value: form.desc, onChange: (e) => setForm(Object.assign({}, form, { desc: e.target.value })) }),
          h("input", { style: { ...inputStyle, width: 80 }, placeholder: "هزینه (اختیاری)", value: form.cost, onChange: (e) => setForm(Object.assign({}, form, { cost: e.target.value })) }),
          h("input", { type: "date", style: { ...inputStyle, width: 130 }, value: form.date, onChange: (e) => setForm(Object.assign({}, form, { date: e.target.value })) }),
          h("select", { style: inputStyle, value: form.account, onChange: (e) => setForm(Object.assign({}, form, { account: e.target.value })) }, accounts.map((a) => h("option", { key: a }, a))),

      h("input", { style: inputStyle, placeholder: "نام تجهیز جدید", value: newEq.name, onChange: (e) => setNewEq(Object.assign({}, newEq, { name: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 100 }, placeholder: "هر چند روز", value: newEq.intervalDays, onChange: (e) => setNewEq(Object.assign({}, newEq, { intervalDays: e.target.value })) }),

function AccountingTab(props) {
  const finance = props.finance, setFinance = props.setFinance, financeByMonth = props.financeByMonth;

  const [form, setForm] = useState({ date: todayISO(), flow: "income", category: INCOME_CATEGORIES[0], account: accounts[0] || "", amount: "", note: "" });
  const [editAcc, setEditAcc] = useState(null);

  const removeEntry = (id) => setFinance((f) => f.filter((e) => e.id !== id));
  const lastFin = financeByMonth[financeByMonth.length - 1];

  const saveAccName = (oldName) => {
    const newName = accDraft.trim();

    setFinance((f) => f.map((e) => e.account === oldName ? Object.assign({}, e, { account: newName }) : e));

  const rangeEntries = useMemo(() => finance.filter((e) => e.date >= range.from && e.date <= range.to), [finance, range]);

        editAcc === a

              h("input", { style: inputStyle, value: accDraft, onChange: (e) => setAccDraft(e.target.value) }),

function InventoryTab(props) {
  const inventory = props.inventory, setInventory = props.setInventory, addFinanceEntry = props.addFinanceEntry, accounts = props.accounts;
  const [newItem, setNewItem] = useState({ name: "", qty: "", min: "", unit: "", cost: "", category: EXPENSE_CATEGORIES[0], account: accounts[0] || "" });
  const [noteDraft, setNoteDraft] = useState({});

  const addItem = () => {
    if (!newItem.name) return;
    setInventory((inv) => inv.concat([{ id: uid(), name: newItem.name, qty: Number(newItem.qty) || 0, min: Number(newItem.min) || 0, unit: newItem.unit || "عدد", log: [] }]));
    if (newItem.cost) addFinanceEntry({ date: todayISO(), flow: "expense", category: newItem.category, account: newItem.account, amount: Number(newItem.cost) || 0, note: "خرید انبار: " + newItem.name });
    setNewItem({ name: "", qty: "", min: "", unit: "", cost: "", category: EXPENSE_CATEGORIES[0], account: accounts[0] || "" });
  };
  const removeItem = (id) => setInventory((inv) => inv.filter((i) => i.id !== id));
  const bump = (id, d) => {
    const note = noteDraft[id] || "";
    setInventory((inv) => inv.map((it) => it.id === id ? Object.assign({}, it, { qty: Math.max(0, Number(it.qty) + d), log: (it.log || []).concat([{ id: uid(), date: todayISO(), change: d, note: note }]) }) : it));
    setNoteDraft(Object.assign({}, noteDraft, { [id]: "" }));
  };

  return h(Niche, null,
    h(SectionTitle, { eyebrow: "موجودی انبار", title: "کالاها، ورود/خروج، و نقطه سفارش مجدد" }),
    inventory.map((it) => {
      const low = Number(it.qty) < Number(it.min);
      return h("div", { key: it.id, style: { background: C.sand, borderRadius: 10, padding: "10px 12px", marginBottom: 6 } },
        h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          h("div", null, h("div", { style: { fontWeight: 600, fontSize: 13 } }, it.name), h("div", { style: { fontSize: 11, color: C.inkSoft } }, "حداقل: " + it.min + " " + it.unit)),
          h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
            low ? h(Pill, { text: "کمبود", tone: "overdue" }) : null,
            h("button", { onClick: () => bump(it.id, -1), style: btnCircle }, "-"),
            h("div", { style: { minWidth: 30, textAlign: "center", fontWeight: 700 } }, it.qty),
            h("button", { onClick: () => bump(it.id, 1), style: btnCircle }, "+"),
            h("button", { onClick: () => removeItem(it.id), style: { border: "none", background: "none", cursor: "pointer" } }, "🗑")
          )
        ),
        h("input", { style: { ...inputStyle, width: "100%", marginTop: 6 }, placeholder: "یادداشت ورود/خروج بعدی (اختیاری، مثلاً: مصرف برای اتاق مراکش)", value: noteDraft[it.id] || "", onChange: (e) => setNoteDraft(Object.assign({}, noteDraft, { [it.id]: e.target.value })) }),
        (it.log && it.log.length) ? h("div", { style: { fontSize: 10.5, color: C.inkSoft, marginTop: 6 } },
          "آخرین تغییرات: " + it.log.slice(-3).reverse().map((l) => l.date + " (" + (l.change > 0 ? "+" : "") + l.change + (l.note ? " - " + l.note : "") + ")").join(" | ")
        ) : null
      );
    }),
    h("div", { style: { fontWeight: 700, fontSize: 12.5, marginTop: 12, marginBottom: 6 } }, "افزودن کالای جدید"),
    h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
      h("input", { style: inputStyle, placeholder: "نام کالا", value: newItem.name, onChange: (e) => setNewItem(Object.assign({}, newItem, { name: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 60 }, placeholder: "موجودی", value: newItem.qty, onChange: (e) => setNewItem(Object.assign({}, newItem, { qty: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 60 }, placeholder: "حداقل", value: newItem.min, onChange: (e) => setNewItem(Object.assign({}, newItem, { min: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 55 }, placeholder: "واحد", value: newItem.unit, onChange: (e) => setNewItem(Object.assign({}, newItem, { unit: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 80 }, placeholder: "هزینه خرید (اختیاری)", value: newItem.cost, onChange: (e) => setNewItem(Object.assign({}, newItem, { cost: e.target.value })) }),
      h("select", { style: inputStyle, value: newItem.category, onChange: (e) => setNewItem(Object.assign({}, newItem, { category: e.target.value })) }, EXPENSE_CATEGORIES.map((c) => h("option", { key: c }, c))),
      h("select", { style: inputStyle, value: newItem.account, onChange: (e) => setNewItem(Object.assign({}, newItem, { account: e.target.value })) }, accounts.map((a) => h("option", { key: a }, a))),
      h("button", { style: btnStyle, onClick: addItem }, "+")
    ),
    h("div", { style: { fontSize: 11, color: C.inkSoft, marginTop: 6 } }, "اگر هزینهٔ خرید وارد شود، خودکار در حسابداری با دسته و حساب انتخابی ثبت می‌شود.")
  );
}

      h("div", null, "ماه " + last.monthKey + " — مجموع: " + last["کربن"] + " kg — تعداد مهمان‌شب: " + last.guestNights),
      last.perGuest != null
        ? h("div", { style: { marginTop: 4, fontWeight: 700, color: (last.perGuest >= CO2_BENCHMARK_LOW && last.perGuest <= CO2_BENCHMARK_HIGH) ? C.sage : C.pomegranate } },
            (last.perGuest.toFixed(1)) + " kg به‌ازای هر مهمان‌شب — " + ((last.perGuest >= CO2_BENCHMARK_LOW && last.perGuest <= CO2_BENCHMARK_HIGH) ? "در محدودهٔ مجاز جهانی (۸ تا ۱۸ کیلوگرم)" : (last.perGuest > CO2_BENCHMARK_HIGH ? "بالاتر از محدودهٔ مجاز — نیاز به کاهش مصرف" : "پایین‌تر از میانگین جهانی — عالی!"))
          )
        : h("div", { style: { marginTop: 4, color: C.inkSoft } }, "برای این ماه هنوز رزروی ثبت نشده تا سرانه محاسبه شود.")
    ) : null,
    h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", marginTop: 12 } },
      h("input", { type: "month", style: inputStyle, value: form.monthKey, onChange: (e) => setForm(Object.assign({}, form, { monthKey: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 80 }, placeholder: "آب (m³)", value: form.water, onChange: (e) => setForm(Object.assign({}, form, { water: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 80 }, placeholder: "برق (kWh)", value: form.electricity, onChange: (e) => setForm(Object.assign({}, form, { electricity: e.target.value })) }),
      h("input", { style: { ...inputStyle, width: 80 }, placeholder: "گاز (m³)", value: form.gas, onChange: (e) => setForm(Object.assign({}, form, { gas: e.target.value })) }),
      h("button", { style: btnStyle, onClick: addReading }, "ثبت ماه")
    ),
    h("div", { style: { fontSize: 10.5, color: C.inkSoft, marginTop: 8 } }, "منبع محدودهٔ مجاز: میانگین صنعت هتلداری بوتیک/کوچک (Cornell-Greenview HCMI، DEFRA) — ۸ تا ۱۸ کیلوگرم CO₂ به‌ازای هر مهمان در هر شب.")
  );
}

function EventsTab(props) {
  const events = props.events, setEvents = props.setEvents, settings = props.settings, setSettings = props.setSettings;
  const [loadingId, setLoadingId] = useState(null);
  const [errId, setErrId] = useState(null);
  const [newEv, setNewEv] = useState({ title: "", season: MONTHS[0], budget: "" });
  const toggle = (id) => setEvents((evs) => evs.map((e) => e.id === id ? Object.assign({}, e, { status: e.status === "done" ? "planned" : "done" }) : e));
  const removeEvent = (id) => setEvents((evs) => evs.filter((e) => e.id !== id));
  const addEvent = () => { if (!newEv.title) return; setEvents((evs) => evs.concat([{ id: uid(), title: newEv.title, season: newEv.season, budget: Number(newEv.budget) || 0, status: "planned" }])); setNewEv({ title: "", season: MONTHS[0], budget: "" }); };
  const total = events.reduce((s, e) => s + Number(e.budget || 0), 0);

  const getSuggestion = async (ev) => {
    if (!settings.apiKey) { setErrId(ev.id); return; }
    setLoadingId(ev.id); setErrId(null);
    try {
      const prompt = "برای رویداد یک اقامتگاه سنتی بوم‌گردی در نایین (کویر ایران) با عنوان «" + ev.title + "» در فصل " + ev.season + "، سه پیشنهاد کوتاه و عملی (هرکدام یک خط، بدون شماره‌گذاری اضافه) برای برگزاری این رویداد بده. فقط به فارسی و خیلی خلاصه پاسخ بده.";
      const text = await callClaudeAPI(settings.apiKey, prompt);
      setEvents((evs) => evs.map((e) => e.id === ev.id ? Object.assign({}, e, { aiSuggestion: text }) : e));
    } catch (err) {
      setEvents((evs) => evs.map((e) => e.id === ev.id ? Object.assign({}, e, { aiSuggestion: "خطا: " + err.message }) : e));
    } finally {
      setLoadingId(null);
    }
  };

  return h(React.Fragment, null,
    h(AIKeyBox, { settings: settings, setSettings: setSettings }),
    h(Niche, null,
      h(SectionTitle, { eyebrow: "تقویم سالانه", title: "۱۲ رویداد و بودجه" }),
      events.map((ev) => h("div", { key: ev.id, style: { background: C.sand, borderRadius: 10, padding: "9px 12px", marginBottom: 6 } },
        h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          h("div", null, h("div", { style: { fontWeight: 600, fontSize: 13 } }, ev.title), h("div", { style: { fontSize: 11, color: C.inkSoft } }, "فصل: " + ev.season + " — بودجه: " + ev.budget)),
          h("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
            h("button", { onClick: () => toggle(ev.id), style: { border: "none", background: "none", cursor: "pointer" } }, h(Pill, { text: ev.status === "done" ? "برگزار شد" : "برنامه‌ریزی‌شده", tone: ev.status })),
            h("button", { onClick: () => getSuggestion(ev), style: { ...btnStyle, padding: "5px 10px", fontSize: 11 }, disabled: loadingId === ev.id }, loadingId === ev.id ? "..." : "💡 پیشنهاد AI"),
            h("button", { onClick: () => removeEvent(ev.id), style: { border: "none", background: "none", cursor: "pointer" } }, "🗑")
          )
        ),
        errId === ev.id ? h("div", { style: { fontSize: 11, color: C.pomegranate, marginTop: 6 } }, "اول کلید API را بالای همین صفحه تنظیم کنید.") : null,
        ev.aiSuggestion ? h("div", { style: { fontSize: 12, marginTop: 8, whiteSpace: "pre-line", background: "#fff", borderRadius: 8, padding: 8 } }, ev.aiSuggestion) : null
      )),
      h("div", { style: { fontWeight: 700, color: C.clay, marginTop: 8 } }, "جمع بودجه سالانه: " + total),
      h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", marginTop: 12 } },
        h("input", { style: inputStyle, placeholder: "عنوان رویداد جدید", value: newEv.title, onChange: (e) => setNewEv(Object.assign({}, newEv, { title: e.target.value })) }),
        h("select", { style: inputStyle, value: newEv.season, onChange: (e) => setNewEv(Object.assign({}, newEv, { season: e.target.value })) }, MONTHS.map((m) => h("option", { key: m }, m))),
        h("input", { style: { ...inputStyle, width: 80 }, placeholder: "بودجه", value: newEv.budget, onChange: (e) => setNewEv(Object.assign({}, newEv, { budget: e.target.value })) }),
        h("button", { style: btnStyle, onClick: addEvent }, "+")
      )
    )
  );
}

function GrowthTab(props) {
  const growth = props.growth, setGrowth = props.setGrowth, settings = props.settings, setSettings = props.setSettings;
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const suggestions = growth.suggestions || [];
  const weekKey = isoLocal(getSaturday(new Date()));
  const alreadyThisWeek = suggestions.some((s) => s.weekKey === weekKey);

  const getWeeklySuggestion = async () => {
    if (!settings.apiKey) { setErr("اول کلید API را تنظیم کنید."); return; }
    setLoading(true); setErr("");
    try {
      const prevTitles = suggestions.map((s) => s.title).join("، ") || "هیچ‌کدام";
      const prompt = "برای صاحبان یک اقامتگاه سنتی بوم‌گردی در نایین (کویر ایران)، یک پیشنهاد فیلم و یک پیشنهاد کتاب مرتبط با فرهنگ، مهمان‌نوازی، کویر یا توسعهٔ فردی بده. این عناوین قبلاً پیشنهاد شده‌اند و نباید تکرار شوند: " + prevTitles + ". پاسخ را دقیقاً به این شکل و فقط دو خط بده:\nفیلم: <نام فیلم> - <یک جملهٔ کوتاه دلیل پیشنهاد>\nکتاب: <نام کتاب> - <یک جملهٔ کوتاه دلیل پیشنهاد>";
      const text = await callClaudeAPI(settings.apiKey, prompt);
      const lines = text.split("\n").filter((l) => l.trim());
      const newItems = [];
      lines.forEach((line) => {
        if (line.indexOf("فیلم:") === 0 || line.indexOf("فیلم :") === 0) newItems.push({ id: uid(), type: "movie", title: line.replace(/^فیلم\s*:/, "").trim(), weekKey: weekKey, checked: false });
        else if (line.indexOf("کتاب:") === 0 || line.indexOf("کتاب :") === 0) newItems.push({ id: uid(), type: "book", title: line.replace(/^کتاب\s*:/, "").trim(), weekKey: weekKey, checked: false });
      });
      if (!newItems.length) newItems.push({ id: uid(), type: "movie", title: text, weekKey: weekKey, checked: false });
      setGrowth({ suggestions: suggestions.concat(newItems) });
    } catch (e) {
      setErr("خطا: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  const toggleCheck = (id) => setGrowth({ suggestions: suggestions.map((s) => s.id === id ? Object.assign({}, s, { checked: !s.checked }) : s) });
  const checkedCount = suggestions.filter((s) => s.checked).length;
  const pct = suggestions.length ? Math.round((checkedCount / suggestions.length) * 100) : 0;

  return h(React.Fragment, null,
    h(AIKeyBox, { settings: settings, setSettings: setSettings }),
    h(Niche, null,
      h(SectionTitle, { eyebrow: "آینه علاقه‌مندی‌ها", title: "پیشنهاد هفتگی فیلم و کتاب" }),
      h("button", { style: btnStyle, onClick: getWeeklySuggestion, disabled: loading || alreadyThisWeek }, loading ? "..." : (alreadyThisWeek ? "این هفته قبلاً پیشنهاد گرفتی" : "پیشنهاد این هفته را بگیر") ),
      err ? h("div", { style: { color: C.pomegranate, fontSize: 12, marginTop: 6 } }, err) : null,
      suggestions.length ? h("div", { style: { marginTop: 12, fontSize: 12 } }, "میزان پیگیری: " + checkedCount + " از " + suggestions.length + " (" + pct + "٪)") : null,
      h("div", { style: { marginTop: 10, display: "flex", flexDirection: "column", gap: 8 } },
        suggestions.slice().reverse().map((s) => h("label", { key: s.id, style: { display: "flex", alignItems: "center", gap: 8, background: C.sand, borderRadius: 10, padding: "9px 12px", fontSize: 12.5, cursor: "pointer" } },
          h("input", { type: "checkbox", checked: !!s.checked, onChange: () => toggleCheck(s.id) }),
          h("span", null, (s.type === "movie" ? "🎬 " : "📖 ") + s.title),
          s.checked ? h(Pill, { text: "دیده/خونده شد", tone: "done" }) : null
        ))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>
</body>
